apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ambient-code

# Resources (base + e2e-specific)
resources:
- ../../base
- secrets.yaml
- test-user.yaml
# Ingress removed - using NodePort for direct access in kind
- operator-config.yaml
- minio-credentials.yaml
- postgresql-credentials.yaml
- unleash-credentials.yaml
# PostgreSQL init scripts for database creation (kind only)
- postgresql-init-scripts.yaml

# Patches for e2e environment
patches:
- path: ambient-api-server-dev-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: api-server-no-jwt-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: api-server-db-security-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server-db
    version: v1
- path: backend-ambient-api-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: backend-api
- path: namespace-patch.yaml
  target:
    kind: Namespace
    name: ambient-code
- path: pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: backend-state-pvc
- path: minio-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: minio-data
- path: frontend-test-patch.yaml
  target:
    kind: Deployment
    name: frontend
- path: operator-env-patch.yaml
  target:
    kind: Deployment
    name: agentic-operator
- path: frontend-service-nodeport.yaml
  target:
    kind: Service
    name: frontend-service
- path: public-api-service-nodeport.yaml
  target:
    kind: Service
    name: public-api-service
# PostgreSQL: smaller PVC for local dev
- path: postgresql-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: postgresql-data
# JSON patches to set imagePullPolicy for all deployments
- path: control-plane-env-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-control-plane
- path: local-image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-control-plane
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: backend-api
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: frontend
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: agentic-operator
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: public-api
# PostgreSQL: add init-scripts volume for database creation
- path: postgresql-init-scripts-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: postgresql

# Kind overlay: Use Quay.io production images by default
# For local development with local images, use overlays/kind-local/ instead
images:
- name: quay.io/ambient_code/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api
  newTag: latest
# Remap RHEL registry images to docker hub equivalents available in kind
- name: registry.redhat.io/rhel9/postgresql-16
  newName: docker.io/library/postgres
  newTag: "16"
# Remap api-server to local image (init container + main container)
- name: quay.io/ambient_code/vteam_api_server
  newName: localhost/vteam_api_server
  newTag: latest
# Remap control-plane to local image
- name: quay.io/ambient_code/ambient_control_plane
  newName: localhost/ambient_control_plane
  newTag: latest
