# JSON patch to replace ambient-api-server-db container for RHEL image
# Replaces volumeMounts to fix mount path for RHEL data directory
# Replaces env vars for RHEL naming convention (POSTGRESQL_* instead of POSTGRES_*)
# Replaces probes to use POSTGRESQL_USER env var
- op: replace
  path: /spec/template/spec/containers/0/image
  value: registry.redhat.io/rhel10/postgresql-16:10.1
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
  - name: POSTGRESQL_USER
    valueFrom:
      secretKeyRef:
        name: ambient-api-server-db
        key: db.user
  - name: POSTGRESQL_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ambient-api-server-db
        key: db.password
  - name: POSTGRESQL_DATABASE
    valueFrom:
      secretKeyRef:
        name: ambient-api-server-db
        key: db.name
- op: replace
  path: /spec/template/spec/containers/0/volumeMounts
  value:
  - name: ambient-api-server-db-data
    mountPath: /var/lib/pgsql/data
